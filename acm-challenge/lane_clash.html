<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lane Clash - Fix the Bugs!</title>
<style>
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Trebuchet MS', sans-serif;
    color: #fff;
  }
  h1 { color: #ffd700; margin-top: 20px; letter-spacing: 1px; }
  canvas {
    background: linear-gradient(#3a6b35, #2d5028);
    border: 4px solid #ffd700;
    border-radius: 6px;
    margin-top: 10px;
  }
  #hud {
    margin-top: 12px;
    font-size: 18px;
    display: flex;
    gap: 30px;
  }
  #elixirBarWrap {
    width: 240px;
    height: 18px;
    background: #333;
    border: 2px solid #a832ff;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 6px;
  }
  #elixirBar {
    height: 100%;
    background: #a832ff;
    width: 0%;
  }
  #controls {
    margin-top: 14px;
    display: flex;
    gap: 12px;
  }
  button.troopBtn {
    padding: 10px 16px;
    font-size: 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #4dabf7;
    color: #fff;
    font-weight: bold;
  }
  button.troopBtn:disabled {
    background: #555;
    cursor: not-allowed;
  }
  #status {
    margin-top: 10px;
    font-size: 22px;
    color: #ffd700;
    height: 26px;
  }
  #restartBtn {
    margin-top: 8px;
    padding: 8px 20px;
    font-size: 16px;
    background: #ffd700;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    display: none;
  }
</style>
</head>
<body>

<h1>⚔️ LANE CLASH ⚔️ (find & fix the bugs!)</h1>
<canvas id="gameCanvas" width="600" height="300"></canvas>

<div id="hud">
  <div>Your Tower: <span id="playerHP">100</span> HP</div>
  <div>Enemy Tower: <span id="enemyHP">100</span> HP</div>
</div>
<div id="elixirBarWrap"><div id="elixirBar"></div></div>

<div id="controls">
  <button class="troopBtn" onclick="spawnTroop('player')">Deploy Knight (3 Elixir)</button>
</div>

<div id="status"></div>
<button id="restartBtn">Restart</button>

<script>
// =====================================================
//  ACM CHALLENGE - LANE CLASH (Clash Royale style)
//  This game has several intentional bugs.
//  Find them, fix them, then add your own twist
//  (new troop type, spells, faster enemy AI, etc.)
// =====================================================

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const LANE_Y = 150;
const PLAYER_TOWER_X = 30;
const ENEMY_TOWER_X = 570;

let playerHP = 100;
let enemyHP = 100;
let elixir = 5;
const MAX_ELIXIR = 10;
let gameRunning = true;
let animationId;

let troops = []; // each: {x, side, hp, speed, atk, w}

let lastEnemySpawn = 0;
const ENEMY_SPAWN_INTERVAL = 3000; // ms
let lastTime = performance.now();

function spawnTroop(side) {
  if (side === "player") {
    if (elixir < 3) return; // not enough elixir
    elixir -= 3;
    troops.push({
      x: PLAYER_TOWER_X + 20,
      side: "player",
      hp: 30,
      speed: 40, // px per second
      atk: 5,
      w: 16
    });
  } else {
    troops.push({
      x: ENEMY_TOWER_X - 20,
      side: "enemy",
      hp: 30,
      speed: 40,
      atk: 5,
      w: 16
    });
  }
}

function updateElixirBar() {
  // BUG: bar width calculation divides by wrong max value
  const pct = (elixir / MAX_ELIXIR) * 100;
  document.getElementById("elixirBar").style.width = pct + "%";
}

function regenElixir(dt) {
  // Should regen ~1 elixir every 2 seconds
  elixir += dt / 2000;
  if (elixir > MAX_ELIXIR) {
    elixir = MAX_ELIXIR;
  }
  // BUG: elixir is a float internally which is fine, but the
  // deploy button never checks/updates its disabled state,
  // so it's always clickable even at 0 elixir (see index.html button)
}

function moveTroops(dt) {
  for (let t of troops) {
    let blocked = false;

    // Check if an enemy troop is in front of this one (melee stop range)
    for (let other of troops) {
      if (other === t) continue;
      if (other.side !== t.side) {
        let dist = Math.abs(other.x - t.x);
        // BUG: attack range check uses AND instead of proper directional
        // check, so troops sometimes fight through each other or stop
        // too early/late
        if (dist < 25 && dist > -25) {
          blocked = true;
          // Combat! Both deal damage over time
          other.hp -= t.atk * (dt / 1000);
        }
      }
    }

    if (!blocked) {
      if (t.side === "player") {
        t.x += t.speed * (dt / 1000);
      } else {
        // BUG: enemy troops move in the wrong direction (should move
        // left toward player tower, but this adds instead of subtracts)
        t.x += t.speed * (dt / 1000);
      }
    }
  }

  // Remove dead troops
  troops = troops.filter(t => t.hp > 0);

  // Check tower collisions
  for (let t of troops) {
    if (t.side === "player" && t.x >= ENEMY_TOWER_X - 10) {
      enemyHP -= t.atk * (dt / 1000);
      t.hp = 0; // troop is consumed attacking tower... eventually
    }
    if (t.side === "enemy" && t.x <= PLAYER_TOWER_X + 10) {
      playerHP -= t.atk * (dt / 1000);
    }
  }

  troops = troops.filter(t => t.hp > 0);
}

function drawTowers() {
  ctx.fillStyle = "#4dabf7";
  ctx.fillRect(PLAYER_TOWER_X - 15, LANE_Y - 25, 30, 50);
  ctx.fillStyle = "#fa5252";
  ctx.fillRect(ENEMY_TOWER_X - 15, LANE_Y - 25, 30, 50);
}

function drawTroops() {
  for (let t of troops) {
    ctx.beginPath();
    ctx.arc(t.x, LANE_Y, t.w / 2, 0, Math.PI * 2);
    ctx.fillStyle = t.side === "player" ? "#4dabf7" : "#fa5252";
    ctx.fill();
    ctx.closePath();
  }
}

function drawLane() {
  ctx.strokeStyle = "rgba(255,255,255,0.3)";
  ctx.beginPath();
  ctx.moveTo(0, LANE_Y);
  ctx.lineTo(canvas.width, LANE_Y);
  ctx.stroke();
}

function updateHUD() {
  document.getElementById("playerHP").textContent = Math.max(0, Math.round(playerHP));
  // BUG: enemy HP display never gets updated here (typo below refers
  // to the wrong variable), so it always shows 100 until game ends
  document.getElementById("enemyHP").textContent = 100;
  updateElixirBar();
}

function checkWinCondition() {
  if (playerHP <= 0) {
    endGame(false);
  } else if (enemyHP <= 0) {
    endGame(true);
  }
}

function endGame(playerWon) {
  gameRunning = false;
  cancelAnimationFrame(animationId);
  document.getElementById("status").textContent = playerWon
    ? "🏆 VICTORY! Enemy tower destroyed! 🏆"
    : "💀 DEFEAT! Your tower fell! 💀";
  document.getElementById("restartBtn").style.display = "inline-block";
}

function gameLoop(now) {
  if (!gameRunning) return;
  const dt = now - lastTime;
  lastTime = now;

  // Enemy AI spawns troops periodically
  if (now - lastEnemySpawn > ENEMY_SPAWN_INTERVAL) {
    spawnTroop("enemy");
    lastEnemySpawn = now;
  }

  regenElixir(dt);
  moveTroops(dt);

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawLane();
  drawTowers();
  drawTroops();

  updateHUD();
  checkWinCondition();

  animationId = requestAnimationFrame(gameLoop);
}

document.getElementById("restartBtn").addEventListener("click", () => {
  location.reload();
});

animationId = requestAnimationFrame(gameLoop);
</script>
</body>
</html>
